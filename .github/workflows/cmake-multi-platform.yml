# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: cmake-desktop-multiplatform-workflow

on:
    push:
        branches: [main]
        paths: &paths
            - "src/**"
            - "include/**"
            - "cmake/**"
            - "**/*.cmake"
            - "**/*.cpp"
            - "**/*.hpp"
            - "**/*.c"
            - "**/*.h"
            - "**/*.cxx"
            - "**/*.hxx"
            - "**/CMakeLists.txt"
            - "CMakePresets.json"
            - ".github/workflows/**"
            - "android-project/**"
    pull_request:
        branches: [main]
        paths: *paths

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache

jobs:
    # ── native builds ───────────────────────────────────────────────────────────
    native:
        name: native / ${{ matrix.artifact-name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      preset: clang-full
                      artifact-name: linux-clang
                    - os: ubuntu-latest
                      preset: gcc-full
                      artifact-name: linux-gcc
                    - os: windows-latest
                      preset: msvc-full
                      artifact-name: windows-msvc

        steps:
            - name: checkout
              uses: actions/checkout@v6

            - name: install linux system deps
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends \
                    ninja-build clang \
                    libwayland-dev libxkbcommon-dev \
                    libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
                    libdbus-1-dev libudev-dev libasound2-dev

            - name: cache cpm sources
              uses: actions/cache@v5
              with:
                  path: .cpm_cache
                  key: cpm-${{ matrix.artifact-name }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
                  restore-keys: cpm-${{ matrix.artifact-name }}-

            - name: build
              run: cmake --workflow --preset ${{ matrix.preset }}

            - name: upload zip artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}-zip
                  path: build/**/*.zip
                  if-no-files-found: ignore
                  compression-level: 0

            - name: upload tgz artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}-tgz
                  path: build/**/*.tar.gz
                  if-no-files-found: ignore
                  compression-level: 0

    # ── cross-compile: Linux → Windows (llvm-mingw) ─────────────────────────────
    # Build dirs must NOT be cached — a stale CMakeCache.txt from a different ABI
    # run poisons CMAKE_SYSROOT (x86_64 sysroot leaks into i686/aarch64).
    cross-windows:
        name: cross-windows / ${{ matrix.artifact-name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - preset: llvm-mingw-x86_64-full
                      artifact-name: windows-mingw-x86_64
                    - preset: llvm-mingw-i686-full
                      artifact-name: windows-mingw-i686
                    - preset: llvm-mingw-aarch64-full
                      artifact-name: windows-mingw-aarch64

        steps:
            - name: checkout
              uses: actions/checkout@v6

            - name: install build tools
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -y --no-install-recommends ninja-build

            # Keyed on toolchain cmake file hash — bumping LLVM_MINGW_VERSION there
            # automatically busts this cache and triggers a fresh download.
            # No restore-keys: partial toolchain = broken toolchain.
            - name: cache llvm-mingw toolchain
              uses: actions/cache@v5
              with:
                  path: llvm_mingw
                  key: llvm-mingw-${{ hashFiles('cmake/toolchains/llvm_mingw.cmake') }}

            - name: cache cpm sources
              uses: actions/cache@v5
              with:
                  path: .cpm_cache
                  key: cpm-${{ matrix.artifact-name }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
                  restore-keys: cpm-${{ matrix.artifact-name }}-

            - name: build
              run: cmake --workflow --preset ${{ matrix.preset }}

            - name: upload txz artifact
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ matrix.artifact-name }}-txz
                  path: build/**/*.tar.xz
                  if-no-files-found: ignore
                  compression-level: 0

    # ── android APK build ────────────────────────────────────────────────────────
    # Gradle daemon disabled — ephemeral CI runners gain nothing from persistence.
    build-apk:
        name: android / ${{ matrix.build-type }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - build-type: debug
                      gradle-task: assembleDebug
                    # - build-type: release
                    #   gradle-task: assembleRelease

        env:
            ANDROID_PROJECT_DIR: ${{ github.workspace }}/android-project
            GRADLE_OPTS: >-
                -Dorg.gradle.daemon=false
                -Dorg.gradle.parallel=true
                -Dorg.gradle.configureondemand=true

        steps:
            - name: checkout
              uses: actions/checkout@v6

            - name: setup jdk 17
              uses: actions/setup-java@v5
              with:
                  java-version: "17"
                  distribution: temurin

            # Owns ~/.gradle/caches + wrapper cache. Do NOT add cache: gradle to setup-java.
            - name: setup gradle
              uses: gradle/actions/setup-gradle@v5

            - name: cache cpm sources
              uses: actions/cache@v5
              with:
                  path: ${{ github.workspace }}/.cpm_cache
                  key: cpm-android-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
                  restore-keys: cpm-android-

            # sdkmanager exits 1 when all licenses already accepted — || true swallows it.
            - name: accept android sdk licenses
              run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

            - name: build apk
              working-directory: ${{ env.ANDROID_PROJECT_DIR }}
              run: gradle --stacktrace :app:${{ matrix.gradle-task }}

            - name: upload apk artifact
              uses: actions/upload-artifact@v7
              with:
                  name: android-${{ matrix.build-type }}-apk
                  path: ${{ env.ANDROID_PROJECT_DIR }}/app/build/outputs/apk/${{ matrix.build-type }}/*.apk
                  if-no-files-found: error
                  compression-level: 0
